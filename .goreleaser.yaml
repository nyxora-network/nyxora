version: 2

project_name: nyxora

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: nyxora
    main: ./cmd/nyxora
    binary: nyxora
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: default
    format: tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
      - '^chore:'
      - Merge pull request
      - Merge branch

release:
  github:
    owner: nyxorammd-lgtm
    name: nyxora
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"
